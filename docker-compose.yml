services:
  db:
    image: postgis/postgis:16-3.4
    container_name: clearsky-db
    environment:
      POSTGRES_DB: clearsky
      POSTGRES_USER: clearsky
      POSTGRES_PASSWORD: clearsky
    ports:
      - "5432:5432"
    volumes:
      - clearsky-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearsky -d clearsky"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: clearsky-api
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8000
      DATABASE_URL: postgresql+psycopg://clearsky:clearsky@db:5432/clearsky
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      STORAGE_PROVIDER: local
      INFERENCE_DIR: /app/inference
      ALLOWED_INFERENCE_EXTENSIONS: .png,.jpg,.jpeg,.tif,.tiff,.jp2,.j2k
      MAX_INFERENCE_DIMENSION: "2048"
      MAX_INFERENCE_PIXELS: "25000000"
      CLOUDINARY_URL: ""
      SUPABASE_URL: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      SUPABASE_STORAGE_BUCKET: clearsky
      API_INTERNAL_TOKEN: local-dev-token
      JWT_SECRET: local-dev-jwt-secret-change-before-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      DEFAULT_USER_STORAGE_QUOTA_MB: "512"
      MODEL_DIR: /app/models
      MAX_UPLOAD_SIZE_MB: "512"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
      - ./models:/app/models
      - ./outputs/inference:/app/inference

  web:
    build:
      context: ./apps/web
    container_name: clearsky-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  clearsky-postgres:
